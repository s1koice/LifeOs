<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="styles.css">
<title>LifeOS</title>
</head>
<body>
<main class="app">
<h1>LifeOS</h1>
<p class="muted">Личный центр управления: финансы, задачи, план дня.</p>
<div class="grid">
<div class="card"><p>Сегодня</p><h2>₪0</h2></div>
<div class="card"><p>Месяц</p><h2>₪0</h2></div>
</div>
<div class="card">
<h2>Финансы</h2>
<p>Быстрая запись расходов и доходов.</p>
</div>
<div class="card">
<h2>Задачи</h2>
<p>Список задач на день.</p>
</div>
<div class="card">
<h2>План дня</h2>
<p>Фокус, три главные задачи и вечерняя рефлексия.</p>
</div>
</main>
</body>
</html>
